# nginx/chemicalpro.conf
server {
    listen 80;
    server_name www.chemicalpro.in chemicalpro.in;
    return 301 https://www.chemicalpro.in$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.chemicalpro.in;

    ssl_certificate /etc/letsencrypt/live/chemicalpro.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chemicalpro.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain application/json application/javascript text/css application/xml;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass http://app:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # API — no cache
    location /api/ {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Platform "CHEMICALPRO";
        add_header Cache-Control "no-store";
    }

    # Sitemaps — short cache
    location /sitemap {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    # All other pages
    location / {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Platform "CHEMICALPRO";
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
    }

    # Certbot verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
